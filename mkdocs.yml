site_name: Документация ClinicCore

site_url: https://miekkoa.github.io/ClinicSolution-Learning/

repo_url: https://github.com/miekkoa/ClinicSolution-Learning

repo_name: GitHub Repo

theme:

  name: material # Используем современную тему Material Design

  language: ru   # Включаем русский интерфейс (поиск, кнопки)

  features:

    - navigation.expand # Раскрывающееся меню

    - content.code.copy # Кнопка копирования кода

nav:

  - Главная: index.md

  - Руководство пользователя:

      - Быстрый старт: user-guide/getting-started.md

      - Словарь терминов: user-guide/glossary.md

  - Разработчику:

      - Архитектура: developer/architecture.md

      - API: developer/api.md

      
  markdown_extensions:
  - pymdownx.arithmatex:

      generic: true

extra_javascript:

  - javascripts/mathjax.js

  - https://polyfill.io/v3/polyfill.min.js?features=es6

  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

